<div class="sl-wrapper">
  @for (eachQuestion of questions; track eachQuestion; let qIdx = $index) {
    <div class="card sl-card">
      <div class="sl-card-header">
        <span class="question-number">Question {{ qIdx + 1 }}</span>
      </div>
      <h2 class="question-text">{{ eachQuestion.question }}</h2>
      
      <div class="input-container">
        <input
          type="text"
          [(ngModel)]="selectedAnswer[eachQuestion.id]"
          [disabled]="submitted"
          placeholder="Type your answer here..."
          class="input-field input"
          [ngClass]="{
            'correct': submitted && answerStatus[eachQuestion.id] === 'correct',
            'incorrect': submitted && answerStatus[eachQuestion.id] === 'incorrect',
            'empty': submitted && answerStatus[eachQuestion.id] === 'empty'
          }"
          />
      </div>

      <div class="answer-feedback" *ngIf="submitted && answerStatus[eachQuestion.id] === 'incorrect'">
        <mat-icon class="feedback-icon error-icon">cancel</mat-icon>
        <span class="feedback-text">Expected: <strong>{{ eachQuestion.answer }}</strong></span>
      </div>
      <div class="answer-feedback" *ngIf="submitted && answerStatus[eachQuestion.id] === 'correct'">
        <mat-icon class="feedback-icon success-icon">check_circle</mat-icon>
        <span class="feedback-text">Correct!</span>
      </div>
    </div>
  }

  <div class="sl-actions" *ngIf="questions.length > 0">
    <button class="btn btn-primary submit-btn" (click)="onSubmit()" [disabled]="submitted">
      <mat-icon>cloud_upload</mat-icon>
      <span>Submit Answers</span>
    </button>
  </div>
</div>
